name: Build PDFium
on:
  workflow_dispatch:
    inputs:
      version:
        description: "PDFium chromium branch number (e.g. 7725)"
        required: true
      upload:
        description: "Create a GitHub Release and attach the archives"
        required: false
        default: false
        type: boolean

jobs:
  build:
    strategy:
      fail-fast: false
      # Default matrix mirrors build_pdfium.DEFAULT_JOBS: 5 combos.
      # Intel Mac is excluded — request manually if needed.
      matrix:
        include:
          - { platform: linux, arch: amd64 }
          - { platform: linux, arch: arm64 }
          - { platform: mac,   arch: arm64 }
          - { platform: musl,  arch: amd64 }
          - { platform: musl,  arch: arm64 }
    # Mac needs a macOS host — gn gen invokes xcodebuild during setup.
    # All other combos build under a Chromium sysroot and cross-compile
    # fine from linux. release.yml uses the same split (build-mac on
    # macos-15, build-linux on ubuntu-latest).
    runs-on: ${{ matrix.platform == 'mac' && 'macos-15' || 'ubuntu-latest' }}
    # Two ninja phases per archive (static + shared) plus cross-compile for
    # arm64 pushes each combo well past the single-phase budget. 90 minutes
    # gives headroom without letting a hung build loiter forever.
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build PDFium ${{ matrix.platform }}/${{ matrix.arch }}
        run: >-
          python3 pdfium/build_pdfium.py ${{ inputs.version }}
          --platform ${{ matrix.platform }}
          --arch ${{ matrix.arch }}
      - name: Verify archive contents
        # build_pdfium.py's --output-dir defaults to ./bin (relative to cwd,
        # which is the repo root when invoked as `python3 pdfium/build_pdfium.py …`).
        # Earlier versions of this workflow wrote `cd pdfium/bin`, which never
        # existed; the step has been silently path-errored ever since the default
        # was set. Keep it as `cd bin` so the tarball structure is actually checked.
        run: |
          set -eu
          cd bin
          ls -lh
          for f in pdfium-${{ matrix.platform }}-*.tgz; do
            echo "=== $f ==="
            tar tzf "$f"
            if [ "${{ matrix.platform }}" = "mac" ]; then
              tar tzf "$f" | grep -q 'lib/libpdfium.dylib' \
                || { echo "missing libpdfium.dylib in $f"; exit 1; }
            else
              tar tzf "$f" | grep -q 'lib/libpdfium.so' \
                || { echo "missing libpdfium.so in $f"; exit 1; }
              tar tzf "$f" | grep -q 'lib/libpdfium.a' \
                || { echo "missing libpdfium.a in $f";  exit 1; }
            fi
          done

      - name: Verify archive symbols
        # Same invariants release.yml enforces — leaked Chromium std::__Cr::
        # symbols, stripped FPDF_* C API, or missing standard C++ runtime
        # all fail the build here before the artifact is uploaded.
        run: |
          for f in bin/pdfium-${{ matrix.platform }}-*.tgz; do
            bash pdfium/scripts/verify_archive.sh "$f"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: pdfium-${{ matrix.platform }}-${{ matrix.arch }}
          path: bin/pdfium-*.tgz

  release:
    needs: build
    if: ${{ inputs.upload }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          # download-artifact with a single name extracts to <path>; with
          # no name and pattern: '*' it downloads every artifact from the
          # run into <path>/<artifact-name>/, so the tarballs land under
          # artifacts/pdfium-<plat>-<arch>/pdfium-<plat>-<cpu>.tgz.
      - name: Flatten artifacts
        run: |
          set -eu
          mkdir -p release-assets
          find artifacts -name 'pdfium-*.tgz' -exec cp {} release-assets/ \;
          ls -lh release-assets
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          TAG="pdfium-${{ inputs.version }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release '$TAG' already exists, deleting so this run can replace it..."
            gh release delete "$TAG" --yes
          fi
          gh release create "$TAG" \
            --title "PDFium chromium/${{ inputs.version }}" \
            --notes "PDFium libraries built from source.

          Each archive contains:
          - \`lib/libpdfium.so\` (shared library for \`dlopen\`)
          - \`lib/libpdfium.a\` (static archive for \`pdfium-render/static\`)
          - \`include/\` — public C headers
          - \`args.gn\` / \`args.static.gn\` — GN build arguments used

          Source: https://pdfium.googlesource.com/pdfium/+/refs/heads/chromium/${{ inputs.version }}" \
            release-assets/pdfium-*.tgz
